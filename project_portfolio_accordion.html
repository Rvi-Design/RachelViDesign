<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body { font-family: var(--font-sans, system-ui); }

.projects-wrapper {
  padding: 2rem 0;
  max-width: 860px;
}

.projects-header {
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--color-text-tertiary);
  margin-bottom: 1.5rem;
}

.project-card {
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  background: var(--color-background-primary);
  margin-bottom: 12px;
  overflow: hidden;
  transition: border-color 0.2s;
}

.project-card:hover {
  border-color: var(--color-border-secondary);
}

.project-card.open {
  border-color: var(--color-border-secondary);
}

.project-trigger {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 1.25rem 1.5rem;
  cursor: pointer;
  user-select: none;
  width: 100%;
  background: none;
  border: none;
  text-align: left;
}

.project-accent {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 16px;
}

.project-meta {
  flex: 1;
  min-width: 0;
}

.project-name {
  font-size: 16px;
  font-weight: 500;
  color: var(--color-text-primary);
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.project-tagline {
  font-size: 13px;
  color: var(--color-text-secondary);
}

.project-tags {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}

.tag {
  font-size: 11px;
  font-weight: 500;
  padding: 3px 8px;
  border-radius: 99px;
  white-space: nowrap;
}

.tag-pink { background: #FBEAF0; color: #72243E; }
.tag-blue { background: #E6F1FB; color: #0C447C; }
.tag-teal { background: #E1F5EE; color: #085041; }

.chevron {
  flex-shrink: 0;
  font-size: 18px;
  color: var(--color-text-tertiary);
  transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
}

.open .chevron {
  transform: rotate(180deg);
}

.project-body {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows 0.3s cubic-bezier(0.4,0,0.2,1);
}

.open .project-body {
  grid-template-rows: 1fr;
}

.project-body-inner {
  overflow: hidden;
}

.project-divider {
  height: 0.5px;
  background: var(--color-border-tertiary);
  margin: 0 1.5rem;
}

.project-content {
  padding: 1.5rem;
}

.content-overview {
  margin-bottom: 1.5rem;
}

.challenge-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 99px;
  background: var(--color-background-secondary);
  color: var(--color-text-secondary);
  margin-bottom: 12px;
}

.section-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--color-text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 0.5rem;
  margin-top: 1.5rem;
}

.section-title:first-child { margin-top: 0; }

.body-text {
  font-size: 14px;
  color: var(--color-text-secondary);
  line-height: 1.7;
}

.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5rem;
  align-items: start;
  margin-top: 1rem;
}

.image-placeholder {
  border-radius: var(--border-radius-md);
  background: var(--color-background-secondary);
  border: 0.5px solid var(--color-border-tertiary);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 2rem;
  color: var(--color-text-tertiary);
  font-size: 12px;
  aspect-ratio: 4/3;
}

.image-placeholder i { font-size: 24px; }

.coming-soon {
  padding: 2.5rem;
  text-align: center;
  color: var(--color-text-tertiary);
  font-size: 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.coming-soon i { font-size: 20px; }

.process-steps {
  display: flex;
  flex-direction: column;
  gap: 0;
  margin-top: 1rem;
}

.step {
  display: flex;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 0.5px solid var(--color-border-tertiary);
}

.step:last-child { border-bottom: none; }

.step-num {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--color-background-secondary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 500;
  color: var(--color-text-secondary);
  flex-shrink: 0;
  margin-top: 1px;
}

.step-label {
  font-size: 13px;
  font-weight: 500;
  color: var(--color-text-primary);
  margin-bottom: 2px;
}

.step-desc {
  font-size: 13px;
  color: var(--color-text-secondary);
  line-height: 1.6;
}
</style>

<h2 class="sr-only">Project portfolio — expanded case studies for each design project</h2>

<div class="projects-wrapper">
  <p class="projects-header">Case studies</p>
  <div id="caseStudiesContainer"></div>
</div>

<script src="caseStudies.js"></script>
