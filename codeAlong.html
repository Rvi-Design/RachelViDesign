<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code along with Dan</title>
</head>
<body>


    <h1>ticket event title</h1>

    <form>
        <fieldset>

        <label for="ticket">Ticket Type</label>
        <select id="ticket">
        <option value="A">Ticket Type (A) - $25.00</option>
        <option value="B">Ticket Type (B) - $30.00</option>
        <option value="C">Ticket Type (C) - $50.00</option>
        </select>

        </fieldset>

        <fieldset>

            <label for="quantity">Number of tickets</label>
            <input type="number" id="quantity" min="1" value="1" step="1">

        </fieldset>
        
    </form>
</body>
</html>
